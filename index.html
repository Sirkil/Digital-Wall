<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0b0b2a; 
            height: 100vh;
            width: 100vw;
            font-family: 'Arial Black', sans-serif;
        }

        /* Fullscreen Background Video */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1; /* Keeps the video behind everything else */
        }


        .name-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            z-index: 20;
        }

        /* The Grid Visualizer */
        .grid-slot {
            position: absolute;                 
            opacity: 1; /* Change to 0 to hide later! */
            pointer-events: none;
            z-index: 10;
        }

        /* The Box that holds the name */
        .name-overlay {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff; 
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 
                         0 0 10px rgba(0, 150, 255, 0.8),
                         0 0 20px rgba(160, 32, 240, 0.8);
            
            left: 0;
            top: 0;
            transform: translate(-50%, -50%) scale(0) rotate(0deg);
            opacity: 0;
            pointer-events: none; 
        }

        /* The actual text inside the box */
        .name-text {
            white-space: nowrap;
            font-size: 3vw; /* Scales automatically based on screen width */
            transform-origin: center center;
        }

        .state-grow {
            opacity: 1;
            transform: translate(-50%, -50%) scale(2.5) rotate(0deg);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease-out;
            z-index: 100;
        }

        .state-move {
            opacity: 1;
            z-index: 20;
            transition: left 4s cubic-bezier(0.25, 1, 0.5, 1), 
                        top 4s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Smoothly fades out old names when they are replaced */
        .state-fade-out {
            opacity: 0 !important;
            transition: opacity 0.5s ease-out !important;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="bg-video">
        <source src="assets/Interactive Game Video.mp4" type="video/mp4">
    </video>

    <div id="nameWrapper" class="name-wrapper"></div>

<script>
        // --- JOTFORM CONFIGURATION ---
        const formID = '260243644298057';
        const apiKey = 'f2b4c8d84f3d90067e99bd5bde065cbb'; // <-- Paste your API key here
        
        // We limit=1 to only grab the most recent submission, saving bandwidth
        const jotformUrl = `https://api.jotform.com/form/${formID}/submissions?apiKey=${apiKey}&limit=1&orderby=created_at`;
        
        let lastSubmissionId = ""; // Track by ID instead of name, so if two "Johns" submit, it still works
        
        const maxNames = 100; 
        const nameWrapper = document.getElementById('nameWrapper'); 
        const slotData = [];
        let activeElements = []; 
        
        let availableSlots = Array.from({length: maxNames}, (_, i) => i);
        // Shuffle the slots so names appear randomly
        for (let i = availableSlots.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [availableSlots[i], availableSlots[j]] = [availableSlots[j], availableSlots[i]];
        }

        // ==========================================
        // 2. GENERATE PERFECT GRID & SKIP TOP 5 INNER
        // ==========================================
        function createGrid() {
            const rows = 11; 
            const cols = 5;  
            
            const halfWidth = window.innerWidth / 2;
            const halfHeight = window.innerHeight / 2;

            const minX = window.innerWidth * 0.135; 
            const maxX = halfWidth - (window.innerWidth * 0.052); 
            
            const minY = -halfHeight + (window.innerHeight * 0.055); 
            const maxY = halfHeight - (window.innerHeight * 0.055); 

            const stepX = (maxX - minX) / (cols - 1);
            const stepY = (maxY - minY) / (rows - 1);

            const uniformBoxWidth = stepX * 0.85;  
            const uniformBoxHeight = stepY * 0.80; 

            let slotIndex = 0;

            for (let side = 0; side < 2; side++) {
                const isRightSide = (side === 0);
                
                for (let col = 0; col < cols; col++) {
                    for (let row = 0; row < rows; row++) {
                        
                        if (col === 0 && row < 5) {
                            continue; 
                        }

                        if (slotIndex >= maxNames) break; 

                        let finalX = minX + (col * stepX);
                        let finalY = minY + (row * stepY);

                        if (!isRightSide) { finalX = -finalX; }

                        let angleRad = Math.atan2(finalY, finalX);
                        let angleDeg = angleRad * (180 / Math.PI);

                        if (angleDeg > 90 || angleDeg < -90) { angleDeg += 180; }

                        slotData[slotIndex] = { x: finalX, y: finalY, angle: angleDeg, w: uniformBoxWidth, h: uniformBoxHeight };

                        const boxEl = document.createElement('div');
                        boxEl.className = 'grid-slot';
                        boxEl.style.width = uniformBoxWidth + "px";
                        boxEl.style.height = uniformBoxHeight + "px";
                        boxEl.style.left = finalX + "px";
                        boxEl.style.top = finalY + "px";
                        boxEl.style.transform = `translate(-50%, -50%) rotate(${angleDeg}deg)`;
                        nameWrapper.appendChild(boxEl);
                        
                        slotIndex++; 
                    }
                }
            }
        }

        createGrid();

        // ==========================================
        // 3. FETCH FROM JOTFORM API
        // ==========================================
        async function checkForNewName() {
            try {
                const response = await fetch(jotformUrl);
                const data = await response.json();

                // Ensure the API call was successful and we have submissions
                if (data.responseCode === 200 && data.content.length > 0) {
                    const latestSubmission = data.content[0]; 

                    // Check if this is a brand new submission
                    if (latestSubmission.id !== lastSubmissionId) {
                        
                        // If it's the very first time the page loads, just set the ID and don't animate old names
                        if (lastSubmissionId === "") {
                            lastSubmissionId = latestSubmission.id;
                            return; 
                        }

                        lastSubmissionId = latestSubmission.id;
                        const currentName = extractNameFromAnswers(latestSubmission.answers);
                        
                        if (currentName && currentName.trim() !== "") {
                            createNewNameElement(currentName);
                        }
                    }
                }
            } catch (error) {
                console.error("Jotform Connection Error:", error);
            }
        }

        // Helper function to dig into Jotform's complex JSON structure to find the name
        function extractNameFromAnswers(answers) {
            for (const key in answers) {
                const field = answers[key];
                
                // If you are using the specific "Full Name" block in Jotform
                if (field.type === "control_fullname" && field.answer) {
                    return `${field.answer.first || ''} ${field.answer.last || ''}`.trim();
                } 
                // If you are using a standard "Short Text" block labeled "Name"
                else if (field.type === "control_textbox" && field.text.toLowerCase().includes("name") && field.answer) {
                    return field.answer.trim();
                }
            }
            return ""; 
        }

        // ==========================================
        // 4. ANIMATE & PLACE NAME
        // ==========================================
        function createNewNameElement(name) {
            let usedSlotIndex;

            if (availableSlots.length > 0) {
                usedSlotIndex = availableSlots.pop();
            } else {
                const oldestItem = activeElements.shift(); 
                usedSlotIndex = oldestItem.slotIndex;      

                oldestItem.el.classList.add('state-fade-out');
                
                setTimeout(() => {
                    if(oldestItem.el.parentNode) {
                        oldestItem.el.parentNode.removeChild(oldestItem.el);
                    }
                }, 500); 
            }

            const destination = slotData[usedSlotIndex];

            const nameEl = document.createElement('div');
            nameEl.className = 'name-overlay';
            nameEl.style.width = destination.w + "px";
            nameEl.style.height = destination.h + "px";
            
            const textEl = document.createElement('span');
            textEl.className = 'name-text';
            textEl.innerText = name;
            
            nameEl.appendChild(textEl);
            nameWrapper.appendChild(nameEl);

            activeElements.push({ el: nameEl, slotIndex: usedSlotIndex });
            
            void nameEl.offsetWidth; 

            const textWidth = textEl.offsetWidth;
            const maxAllowedWidth = destination.w * 1.5; 
            
            if (textWidth > maxAllowedWidth) {
                const scaleDownRatio = maxAllowedWidth / textWidth;
                textEl.style.transform = `scale(${scaleDownRatio})`;
            }

            nameEl.classList.add('state-grow');

            setTimeout(() => {
                nameEl.classList.remove('state-grow');
                nameEl.classList.add('state-move');

                nameEl.style.left = destination.x + "px";
                nameEl.style.top = destination.y + "px";
                nameEl.style.transform = `translate(-50%, -50%) scale(1) rotate(${destination.angle}deg)`;
            }, 1500); 
        }

        // Check for new names every 2.5 seconds (Jotform limits API calls to 1000/day on free tier or 10,000 on paid)
        setInterval(checkForNewName, 2500);
    </script>
</body>
</html>
